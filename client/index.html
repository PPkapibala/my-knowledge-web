<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 知识小屋</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">

        <!-- ============ 左侧侧边栏 ============ -->
        <aside class="sidebar">

            <!-- Logo -->
            <div class="sidebar-header">
                <div class="logo-area">
                    <span class="logo-icon">🌸</span>
                    <div class="logo-text">
                        <div class="logo-title">知识小屋</div>
                        <div class="logo-subtitle">我的学习收藏夹</div>
                    </div>
                </div>
            </div>

            <!-- 主导航 -->
            <div class="sidebar-nav">
                <div class="nav-item active" id="allContentNav" data-id="all">
                    <span class="nav-item-icon">📚</span>
                    <span class="nav-item-label">全部内容</span>
                    <span class="nav-item-count" id="allCount">0</span>
                </div>
                <div class="nav-item" id="dashboardNav">
                    <span class="nav-item-icon">📊</span>
                    <span class="nav-item-label">学习看板</span>
                </div>
            </div>

            <!-- 分类区 -->
            <div class="sidebar-categories">
                <div class="categories-header">
                    <span class="categories-title">我的分类</span>
                    <button class="categories-add-btn" id="manageCategoryBtn" title="管理分类">+</button>
                </div>
                <ul id="categoryList" class="category-list"></ul>
            </div>

            <!-- 底部操作 -->
            <div class="sidebar-footer">
                <button class="footer-btn" title="导入数据">
                    <span>📥</span>
                    <span>导入</span>
                </button>
                <button class="footer-btn" title="导出数据">
                    <span>📤</span>
                    <span>导出</span>
                </button>
                <button class="footer-btn" id="settingsBtn" title="设置">
                    <span>⚙️</span>
                    <span>设置</span>
                </button>
            </div>
        </aside>

        <!-- ============ 主内容区 ============ -->
        <main class="main-content">

            <!-- 顶部栏 -->
            <header class="top-bar">
                <div class="breadcrumb">
                    <span class="breadcrumb-home">🏠</span>
                    <span class="breadcrumb-sep">›</span>
                    <span class="breadcrumb-current" id="currentCategoryName">全部内容</span>
                </div>
                <div class="top-actions">
                    <div class="search-wrapper">
                        <span class="search-icon">🔍</span>
                        <input id="searchInput" type="text" class="search-input" placeholder="搜索资源...">
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" id="gridViewBtn" title="网格视图">⊞</button>
                        <button class="view-btn" id="listViewBtn" title="列表视图">☰</button>
                    </div>
                    <button id="addBtn" class="add-btn">+ 添加</button>
                </div>
            </header>

            <!-- 状态 Tab -->
            <div class="status-tabs">
                <button class="tab-btn active" data-status="all">
                    全部<span class="tab-count" id="tabCountAll">0</span>
                </button>
                <button class="tab-btn" data-status="todo">
                    📌 待学习<span class="tab-count" id="tabCountTodo">0</span>
                </button>
                <button class="tab-btn" data-status="in_progress">
                    🌱 学习中<span class="tab-count" id="tabCountProgress">0</span>
                </button>
                <button class="tab-btn" data-status="completed">
                    ✅ 已学会<span class="tab-count" id="tabCountDone">0</span>
                </button>
                <button class="tab-btn" data-status="reviewing">
                    🔄 复习中<span class="tab-count" id="tabCountReview">0</span>
                </button>
                <button class="tab-btn" data-status="paused">
                    ⏸️ 暂停<span class="tab-count" id="tabCountPaused">0</span>
                </button>
            </div>

            <!-- 类型筛选栏 -->
            <div class="filter-bar">
                <span class="filter-label">类型筛选</span>
                <div class="filter-chips" id="filterChips">
                    <button class="filter-chip active" data-type="all">全部</button>
                </div>
            </div>

            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-icon stat-icon-all">📚</div>
                    <div class="stat-info">
                        <div class="stat-number" id="statTotal">0</div>
                        <div class="stat-label">全部收藏</div>
                    </div>
                </div>
                <div class="stat-card stat-todo">
                    <div class="stat-icon stat-icon-todo">📌</div>
                    <div class="stat-info">
                        <div class="stat-number" id="statTodo">0</div>
                        <div class="stat-label">待学习</div>
                    </div>
                </div>
                <div class="stat-card stat-progress">
                    <div class="stat-icon stat-icon-prog">🌱</div>
                    <div class="stat-info">
                        <div class="stat-number" id="statProgress">0</div>
                        <div class="stat-label">学习中</div>
                    </div>
                </div>
                <div class="stat-card stat-done">
                    <div class="stat-icon stat-icon-done">✅</div>
                    <div class="stat-info">
                        <div class="stat-number" id="statDone">0</div>
                        <div class="stat-label">已学会</div>
                    </div>
                </div>
            </div>

            <!-- 内容区 -->
            <div class="content-wrapper">
                <div class="content-header">
                    <h2 class="content-title" id="sectionName">最近收藏</h2>
                    <span class="content-meta" id="contentCount"></span>
                </div>
                <div id="articlesContainer" class="articles-container">
                    <div class="empty-state">
                        <div class="empty-icon">📭</div>
                        <p>还没有添加任何资源</p>
                        <button class="add-btn-secondary" id="addBtnSecondary">+ 添加第一个资源</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- ============ 添加资源弹窗 ============ -->
    <div id="addModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>🌸 添加新资源</h2>
                <button class="modal-close" aria-label="关闭">&times;</button>
            </div>
            <form id="addForm" class="add-form">
                <div class="form-group">
                    <label for="urlInput">资源网址</label>
                    <input id="urlInput" type="url" placeholder="粘贴网址链接..." required>
                    <small id="urlHint">粘贴后会自动抓取标题</small>
                </div>
                <div class="form-group">
                    <label for="titleInput">自定义标题</label>
                    <input id="titleInput" type="text" placeholder="标题..." required>
                </div>
                <div class="form-group">
                    <label for="descriptionInput">摘要备注</label>
                    <textarea id="descriptionInput" placeholder="记录重点或来源..." rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="resourceTypeSelect">资源类型</label>
                        <div class="input-with-action">
                            <select id="resourceTypeSelect" required>
                                <option value="">选择类型...</option>
                            </select>
                            <button id="customizeTypeBtn" type="button" class="action-btn" title="自定义资源类型">⚙️</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="categorySelect">分类</label>
                        <div class="input-with-action">
                            <select id="categorySelect" required>
                                <option value="">选择分类...</option>
                            </select>
                            <button id="manageCategoryModalBtn" type="button" class="action-btn" title="管理分类">⚙️</button>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="tagsInput">标签</label>
                    <input id="tagsInput" type="text" placeholder="逗号分隔，如: 前端,React,学习">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel">取消</button>
                    <button type="submit" class="btn-submit">🌸 保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ============ 分类管理弹窗 ============ -->
    <div id="categoryModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>🏷️ 分类管理</h2>
                <button class="modal-close" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <div class="add-category-section">
                    <div class="form-row">
                        <input id="newCategoryIcon" type="text" class="icon-input" placeholder="📚" maxlength="2">
                        <input id="newCategoryName" type="text" class="category-name-input" placeholder="输入分类名称...">
                        <select id="newCategoryParent" class="parent-select">
                            <option value="">顶级分类</option>
                        </select>
                        <button id="addCategoryBtn" class="btn-primary">+ 新增</button>
                    </div>
                </div>
                <div id="categoryManageList" class="category-manage-list"></div>
            </div>
            <div class="modal-footer">
                <button id="categoryModalDoneBtn" class="btn-primary">✅ 完成</button>
            </div>
        </div>
    </div>

    <!-- ============ 资源类型管理弹窗 ============ -->
    <div id="resourceTypeModal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>🎯 自定义资源类型</h2>
                <button class="modal-close" aria-label="关闭">&times;</button>
            </div>
            <div class="modal-body">
                <div class="add-type-section">
                    <div class="form-row">
                        <input id="newTypeIcon" type="text" class="icon-input" placeholder="📌" maxlength="2">
                        <input id="newTypeName" type="text" class="type-name-input" placeholder="输入类型名称...">
                        <button id="addTypeBtn" class="btn-primary">+ 新增</button>
                    </div>
                </div>
                <div id="typeList" class="type-list"></div>
            </div>
            <div class="modal-footer">
                <button id="resourceTypeModalDoneBtn" class="btn-primary">✅ 完成</button>
            </div>
        </div>
    </div>

    <!-- Toast 通知 -->
    <div id="toast" class="toast hidden"></div>

    <!-- 脚本 -->
    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/category.js"></script>
    <script src="js/resource-type.js"></script>
    <script src="js/app.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
